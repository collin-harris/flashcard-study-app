services:
  db_test:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: flashcard_test_db
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "flashcard_test_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      target: test
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db_test:5432/flashcard_test_db
    depends_on:
      db_test:
        condition: service_healthy
